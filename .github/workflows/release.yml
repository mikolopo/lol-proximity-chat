name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Download Python worker
        shell: pwsh
        run: |
          $exeName = "python-worker-x86_64-pc-windows-msvc.exe"
          $dest = "desktop/src-tauri/$exeName"
          $url = "https://github.com/${{ github.repository }}/releases/download/python-worker-latest/$exeName"
          Invoke-WebRequest -Uri $url -OutFile $dest -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" }

      - name: Build release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundleDir = "desktop/src-tauri/target/release/bundle"

          $msiSigPath = "$bundleDir/msi/LoLProximityChat_${version}_x64_en-US.msi.zip.sig"
          $nsisSigPath = "$bundleDir/nsis/LoLProximityChat_${version}_x64-setup.nsis.zip.sig"

          if (-not (Test-Path $msiSigPath)) { Write-Error "MSI sig not found"; exit 1 }

          $msiSig  = (Get-Content $msiSigPath  -Raw).Trim()
          $nsisSig = if (Test-Path $nsisSigPath) { (Get-Content $nsisSigPath -Raw).Trim() } else { $msiSig }

          $repo = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"

          $latestJson = @{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $msiSig
                url       = "$baseUrl/LoLProximityChat_${version}_x64_en-US.msi.zip"
              }
            }
          } | ConvertTo-Json -Depth 10

          $latestJson | Set-Content "latest.json" -Encoding utf8
          gh release upload $tag latest.json --clobber --repo $repo
