name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Download Python worker
        shell: pwsh
        run: |
          $exeName = "python-worker-x86_64-pc-windows-msvc.exe"
          $dest = "desktop/src-tauri/$exeName"
          $url = "https://github.com/${{ github.repository }}/releases/download/python-worker-latest/$exeName"
          Invoke-WebRequest -Uri $url -OutFile $dest -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" }

      - name: Build release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Sign bundles and upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundle  = "desktop/src-tauri/target/release/bundle"
          $repo    = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          
          # Helper to zip + sign a file (TAURI_SIGNING_PRIVATE_KEY env var is already set)
          function Sign-Bundle($srcPath, $zipPath) {
            Write-Host "Zipping $srcPath to $zipPath using standard format..."
            Compress-Archive -Path $srcPath -DestinationPath $zipPath -Force
            Write-Host "Signing..."
            $tauriBin = "desktop/node_modules/.bin/tauri"
            & $tauriBin signer sign --password $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $zipPath
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $zipPath" }
          }
          
          $nsisSrc  = "$bundle/nsis/LoLProximityChat_${version}_x64_setup.exe"
          $nsisZip  = "$bundle/nsis/LoLProximityChat_${version}_x64_setup.exe.zip"
          
          Sign-Bundle $nsisSrc $nsisZip
          
          $nsisSig = (Get-Content "$nsisZip.sig" -Raw).Trim()
          
          # Build latest.json
          $latestJson = @{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisSig
                url       = "$baseUrl/LoLProximityChat_${version}_x64_setup.exe.zip"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $latestJson | Set-Content "latest.json" -Encoding utf8
          
          # Upload signed zip and latest.json
          gh release upload $tag $nsisZip --clobber --repo $repo
          gh release upload $tag latest.json --clobber --repo $repo

